services:
  mongodb:
    image: mongo:8.0
    container_name: mongo-sbp
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - mongo-metabase

  metabase:
    image: metabase/metabase:v0.53.4
    container_name: metabase-sbp
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      MB_JETTY_HOST: 0.0.0.0
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      - mongodb
    networks:
      - mongo-metabase

networks:
  mongo-metabase:
    driver: bridge

volumes:
  mongo_data:
    external: true
    name: b4f7839d1c842c370cd4b859565765f29fbe99a1477fda357b01c93d0e7f8168
  mongo_config:
    external: true
    name: bc096bddff3bbdf3d840c88e07e22f9db5bcb9f9b9d2e1c4d64676d521131a62
  metabase_data:
